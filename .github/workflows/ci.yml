name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install capnp
      run: |
        sudo apt-get update
        sudo apt-get install -y capnproto
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - run: npm install
    - run: npm run typecheck
    - run: npm run lint
    - run: npm run build
    - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
    - uses: actions/checkout@v4
    - name: Install capnp
      run: |
        sudo apt-get update
        sudo apt-get install -y capnproto
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'
    - run: npm install
    - run: npm run build
    - run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

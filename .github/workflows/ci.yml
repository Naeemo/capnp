name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install capnp
      run: |
        sudo apt-get update
        sudo apt-get install -y capnproto
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - uses: pnpm/action-setup@v2
      with:
        version: 9
    - run: pnpm install
    - run: pnpm run typecheck
    - run: pnpm run lint
    - run: pnpm run build
    - run: pnpm exec vitest --version
    - run: pnpm exec vitest run --reporter=verbose --exclude="**/tcp-transport-compression.test.ts"

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
    - uses: actions/checkout@v4
    - name: Install capnp
      run: |
        sudo apt-get update
        sudo apt-get install -y capnproto
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'
    - uses: pnpm/action-setup@v2
      with:
        version: 9
    - run: pnpm install
    - run: pnpm run build
    - run: pnpm publish --access public --no-git-checks
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
